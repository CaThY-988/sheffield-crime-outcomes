version: 2

models:
  - name: int_police_outcomes
    description: >
      Intermediate model for police outcomes with nested API fields flattened
      into atomic columns for easier downstream modelling and analysis.
    columns:
      - name: outcome_category_code
        data_type: string
        description: >
          Internal code representing the outcome category, such as
          local-resolution or charged.

      - name: outcome_category_name
        data_type: string
        description: >
          Human-readable name of the outcome category.

      - name: outcome_date
        data_type: string
        description: >
          Month of the outcome in YYYY-MM format.

      - name: person_id
        data_type: string
        description: >
          Identifier for the suspect or offender where available.

      - name: crime_id
        data_type: bigint
        description: >
          API-specific identifier for the linked crime. This is not a police identifier.

      - name: crime_persistent_id
        data_type: string
        description: >
          Stable 64-character identifier for the crime record.

      - name: crime_category
        data_type: string
        description: >
          Crime category associated with the outcome, such as public-order or violent-crime.

      - name: crime_location_type
        data_type: string
        description: >
          Type of police location, typically Force or BTP.

      - name: crime_location_subtype
        data_type: string
        description: >
          More specific subtype for BTP locations where applicable.

      - name: crime_context
        data_type: string
        description: >
          Additional context about the crime where supplied by the API.

      - name: crime_month
        data_type: string
        description: >
          Month the linked crime was recorded, in YYYY-MM format.

      - name: crime_latitude
        data_type: string
        description: >
          Approximate latitude of the linked crime location.

      - name: crime_longitude
        data_type: string
        description: >
          Approximate longitude of the linked crime location.

      - name: crime_street_id
        data_type: bigint
        description: >
          API identifier for the approximate street location.

      - name: crime_street_name
        data_type: string
        description: >
          Human-readable name of the approximate street location.